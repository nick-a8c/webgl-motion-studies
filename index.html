<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGL Motion Studies</title>
<style>
  :root {
    /* Dark mode (default) */
    --bg: #0a0a0a;
    --panel: #18181b;
    --panel-2: #232327;
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.22);
    --text: #e8e8ea;
    --text-2: #9b9ba3;
    --text-3: #6c6c75;
    --accent: #d8d8df;
    --tab-active-bg: transparent;
    --tab-active-border: rgba(255,255,255,0.55);
    --tab-inactive-bg: rgba(255,255,255,0.04);
    --tab-inactive-text: rgba(232,232,234,0.45);
  }
  body.light {
    --bg: #e8e8ea;
    --panel: #d8d8db;
    --panel-2: #c8c8cc;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.30);
    --text: #1a1a1c;
    --text-2: #5a5a62;
    --text-3: #8c8c95;
    --accent: #2a2a30;
    --tab-active-bg: transparent;
    --tab-active-border: rgba(0,0,0,0.55);
    --tab-inactive-bg: rgba(0,0,0,0.04);
    --tab-inactive-text: rgba(26,26,28,0.45);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; transition: background 200ms, color 200ms; }

  /* App layout: top tabs, main row, bottom bar */
  .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto;
    padding: 24px; gap: 24px; }

  /* Top-center tabs */
  .top-tabs { display: flex; justify-content: center; }
  .tab-list { display: flex; gap: 8px; }
  .tab-btn { background: var(--tab-inactive-bg); color: var(--tab-inactive-text);
    border: 1px solid transparent; padding: 8px 18px; border-radius: 6px;
    cursor: pointer; font-family: ui-monospace, "SF Mono", "Berkeley Mono", Menlo, monospace;
    font-size: 13px; letter-spacing: 0.02em; transition: all 140ms; }
  .tab-btn:hover { color: var(--text); background: var(--panel-2); }
  .tab-btn.active { color: var(--text); background: var(--tab-active-bg);
    border-color: var(--tab-active-border); }

  /* Main row: stage + panel */
  .main { display: grid; grid-template-columns: minmax(0, 1fr) 280px;
    gap: 16px; align-items: stretch; min-height: 0; }
  @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

  /* Stage (canvas wrapper) */
  .stage-wrap { position: relative; background: #ffffff;
    border-radius: 8px; overflow: hidden; min-height: 0;
    aspect-ratio: 16 / 11; max-height: calc(100vh - 180px); margin: 0 auto;
    width: 100%; }
  .stage { width: 100%; height: 100%; display: block; }
  .meta { position: absolute; left: 12px; bottom: 10px; font-size: 11px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; pointer-events: none;
    opacity: 0.4; color: rgba(0,0,0,0.5); }

  /* Right control panel — floating card */
  .panel { background: var(--panel); border-radius: 8px; padding: 14px 14px 0;
    display: flex; flex-direction: column; min-height: 0;
    align-self: start; max-height: calc(100vh - 180px); overflow: hidden; }
  #controls-host { overflow-y: auto; flex: 1; padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent; }
  #controls-host::-webkit-scrollbar { width: 4px; }
  #controls-host::-webkit-scrollbar-track { background: transparent; }
  #controls-host::-webkit-scrollbar-thumb { background: var(--border);
    border-radius: 2px; transition: background 200ms; }
  #controls-host::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  .panel-section { font-size: 10px; color: var(--text-3); text-transform: uppercase;
    letter-spacing: 0.10em; margin: 14px 0 8px; font-weight: 500; }
  .panel-section:first-child { margin-top: 4px; }

  .control { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .control .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .control label { font-size: 12px; color: var(--text-2); }
  .control .val { font-size: 12px; font-weight: 500; color: var(--text);
    font-variant-numeric: tabular-nums; }
  .control input[type="range"] { width: 100%; accent-color: var(--accent);
    margin: 0; height: 18px; }
  .control input[type="text"] { width: 100%; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px;
    color: var(--text); font-family: inherit; font-size: 12px; outline: none; }
  .control input[type="text"]:focus { border-color: var(--border-strong); }
  .control input[type="color"] { width: 40px; height: 24px; padding: 0;
    border: 1px solid var(--border); border-radius: 6px; background: transparent;
    cursor: pointer; }
  .control .row { display: flex; gap: 8px; align-items: center; }
  .control .row input[type="text"] { flex: 1; }
  .control .row .hex-input { font-family: ui-monospace, "SF Mono", Menlo, monospace;
    text-transform: lowercase; padding: 4px 8px; font-size: 11px;
    letter-spacing: 0.02em; }

  /* Reset / Pause / Restart buttons at bottom of panel */
  .actions { display: flex; gap: 6px; flex-wrap: wrap; padding: 12px 0;
    border-top: 1px solid var(--border); margin-top: 4px; flex-shrink: 0; }
  .actions button { background: transparent; color: var(--text-2);
    border: 1px solid var(--border-strong); padding: 6px 10px; border-radius: 6px;
    cursor: pointer; font-family: inherit; font-size: 12px; transition: all 120ms;
    flex: 1; min-width: 0; }
  .actions button:hover { background: var(--panel-2); color: var(--text); }
  .actions button:active { transform: scale(0.97); }

  /* Bottom-centered theme toggle */
  .bottom-bar { display: flex; flex-direction: column; align-items: center;
    gap: 6px; padding: 4px 0; }
  .theme-toggle { background: transparent; color: var(--text-2);
    border: 1px solid var(--border-strong); padding: 6px 16px; border-radius: 6px;
    cursor: pointer; font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px; transition: all 120ms; }
  .theme-toggle:hover { background: var(--panel-2); color: var(--text); }
  .theme-toggle:active { transform: scale(0.97); }
  .credits { font-size: 10px; color: var(--text-3);
    font-family: ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: 0.04em; }
</style>
</head>
<body>

<div class="app">
  <!-- Top: animation switcher pills -->
  <nav class="top-tabs">
    <div id="anim-list" class="tab-list"></div>
  </nav>

  <!-- Main area: stage on the left, floating panel on the right -->
  <main class="main">
    <div class="stage-wrap" id="stage-wrap">
      <canvas id="stage" class="stage"></canvas>
      <div class="meta" id="meta">webgl · three.js</div>
    </div>

    <aside class="panel">
      <div id="controls-host"></div>
      <div class="actions">
        <button id="btn-reset">Reset</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-restart">Restart</button>
      </div>
    </aside>
  </main>

  <!-- Bottom-centered theme toggle + credits -->
  <footer class="bottom-bar">
    <button id="theme-toggle" class="theme-toggle">Light mode</button>
    <div class="credits">WebGL Motion Studies · Three.js</div>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Line2 modules for variable-thickness lines (WebGL line width support is limited).
     These attach to the global THREE namespace. -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/lines/LineSegmentsGeometry.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/lines/LineGeometry.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/lines/LineMaterial.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/lines/LineSegments2.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/lines/Line2.js"></script>

<script>
// ============================================
// SECTION 1: Shared utilities
// ============================================
(function(){
  'use strict';

  function hash2(ix, iy){
    let h = (ix * 374761393) ^ (iy * 668265263);
    h = (h ^ (h >>> 13)) * 1274126177;
    h = h ^ (h >>> 16);
    return ((h >>> 0) / 4294967295) * 2 - 1;
  }
  function smoothstep(t){ return t*t*(3-2*t); }
  function valueNoise2D(x, y){
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const a = hash2(ix,   iy);
    const b = hash2(ix+1, iy);
    const c = hash2(ix,   iy+1);
    const d = hash2(ix+1, iy+1);
    const u = smoothstep(fx), v = smoothstep(fy);
    return (a*(1-u) + b*u)*(1-v) + (c*(1-u) + d*u)*v;
  }
  function loopingNoise(x, y, t, period){
    const ang = (t / period) * Math.PI * 2;
    const tx = Math.cos(ang) * 1.3;
    const ty = Math.sin(ang) * 1.3;
    return valueNoise2D(x + tx, y + ty);
  }
  function envelopePulse(phase){
    if (phase < 0.5){
      const u = phase / 0.5;
      return u*u*(3-2*u);
    } else {
      const u = (phase - 0.5) / 0.5;
      return 1 - u*u*(3-2*u);
    }
  }

  // ---- Perlin (gradient) noise — proper, not value-based ----
  // Classic Ken Perlin permutation table, doubled for index-wrap-free lookup.
  const PERM = (function(){
    const p = new Uint8Array(512);
    const base = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,
      103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,
      252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,
      68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,
      230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,
      76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,
      186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,
      59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,
      221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,
      185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,
      51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,
      121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,
      78,66,215,61,156,180];
    for (let i = 0; i < 256; i++){ p[i] = base[i]; p[i+256] = base[i]; }
    return p;
  })();

  function fade(t){ return t*t*t*(t*(t*6-15)+10); } // 6t^5-15t^4+10t^3
  function lerp(a, b, t){ return a + t * (b - a); }
  function grad3(hash, x, y, z){
    const h = hash & 15;
    const u = h < 8 ? x : y;
    const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
    return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
  }

  // 3D Perlin noise — returns roughly -1..1
  function perlin3(x, y, z){
    const X = Math.floor(x) & 255;
    const Y = Math.floor(y) & 255;
    const Z = Math.floor(z) & 255;
    x -= Math.floor(x);
    y -= Math.floor(y);
    z -= Math.floor(z);
    const u = fade(x), v = fade(y), w = fade(z);
    const A = PERM[X] + Y;
    const AA = PERM[A] + Z;
    const AB = PERM[A + 1] + Z;
    const B = PERM[X + 1] + Y;
    const BA = PERM[B] + Z;
    const BB = PERM[B + 1] + Z;
    return lerp(
      lerp(
        lerp(grad3(PERM[AA  ], x  , y  , z  ), grad3(PERM[BA  ], x-1, y  , z  ), u),
        lerp(grad3(PERM[AB  ], x  , y-1, z  ), grad3(PERM[BB  ], x-1, y-1, z  ), u), v),
      lerp(
        lerp(grad3(PERM[AA+1], x  , y  , z-1), grad3(PERM[BA+1], x-1, y  , z-1), u),
        lerp(grad3(PERM[AB+1], x  , y-1, z-1), grad3(PERM[BB+1], x-1, y-1, z-1), u), v),
      w);
  }

  // Fractal Brownian Motion: layered Perlin. Falloff (a.k.a. persistence) is
  // how much each successive octave contributes; 0.5 is the classic value.
  function fbm3(x, y, z, octaves, falloff){
    let sum = 0, amp = 1, totalAmp = 0;
    let fx = x, fy = y, fz = z;
    for (let i = 0; i < octaves; i++){
      sum += perlin3(fx, fy, fz) * amp;
      totalAmp += amp;
      amp *= falloff;
      fx *= 2; fy *= 2; fz *= 2;
    }
    return totalAmp > 0 ? sum / totalAmp : 0;
  }

  window.MotionNoise = { valueNoise2D, loopingNoise, envelopePulse, smoothstep, perlin3, fbm3 };
})();

// ============================================
// SECTION 2: Animation — Glyph
//
// Travel shapes (square / circle / triangle) along a path that traces
// each character of the user's text. Path geometry comes from the Hershey
// "simplex" stroke font — single-stroke vector glyphs originally designed
// for plotters. Multi-stroke characters (like 'T' = bar + stem) are kept
// as one logical character; the shapes silently jump between strokes.
//
// Path arc-length is precomputed once per text change. Per-frame work is
// just sampling N points along that path and updating per-shape transforms.
// ============================================
(function(){
  'use strict';
  const { loopingNoise, envelopePulse } = window.MotionNoise;
  window.MotionAnimations = window.MotionAnimations || [];

  // Each glyph is { w: advance width, strokes: [[ [x,y], [x,y], ... ], ...] }

  // Source: public-domain Hershey simplex set (Allen V. Hershey, 1967).
  // Compact format: each glyph encoded as "w:s|s|s" where each stroke is
  // a string of "x,y;x,y;..." pairs.

    '$': '20:8,-25;8,4|12,-25;12,4|17,-18;15,-20;12,-21;8,-21;5,-20;3,-18;3,-16;4,-14;5,-13;7,-12;13,-10;15,-9;16,-8;17,-6;17,-3;15,-1;12,0;8,0;5,-1;3,-3',
    '%': '24:21,-21;3,0|8,-21;10,-19;10,-17;9,-15;7,-14;5,-14;3,-16;3,-18;4,-20;6,-21;8,-21;10,-20;13,-19;16,-19;19,-20;21,-21|17,-7;15,-6;14,-4;14,-2;16,0;18,0;20,-1;21,-3;21,-5;19,-7;17,-7',
    '&': '26:23,-12;23,-13;22,-14;21,-14;20,-13;19,-11;17,-6;15,-3;13,-1;11,0;7,0;5,-1;4,-2;3,-4;3,-6;4,-8;5,-9;12,-13;13,-14;14,-16;14,-18;13,-20;11,-21;9,-20;8,-18;8,-16;9,-13;11,-10;16,-3;18,-1;20,0;22,0;23,-1;23,-2',
    "'": '10:5,-19;4,-20;5,-21;6,-20;6,-18;5,-16;4,-15',
    '(': '14:11,-25;9,-23;7,-20;5,-16;4,-11;4,-7;5,-2;7,2;9,5;11,7',
    ')': '14:3,-25;5,-23;7,-20;9,-16;10,-11;10,-7;9,-2;7,2;5,5;3,7',
    '*': '16:8,-21;8,-9|3,-18;13,-12|13,-18;3,-12',
    '+': '26:13,-18;13,0|4,-9;22,-9',
    ',': '10:6,-1;5,0;4,-1;5,-2;6,-1;6,1;5,3;4,4',
    '-': '26:4,-9;22,-9',
    '.': '10:5,-2;4,-1;5,0;6,-1;5,-2',
    '/': '22:20,-25;2,7',
    '0': '20:9,-21;6,-20;4,-17;3,-12;3,-9;4,-4;6,-1;9,0;11,0;14,-1;16,-4;17,-9;17,-12;16,-17;14,-20;11,-21;9,-21',
    '1': '20:6,-17;8,-18;11,-21;11,0',
    '2': '20:4,-16;4,-17;5,-19;6,-20;8,-21;12,-21;14,-20;15,-19;16,-17;16,-15;15,-13;13,-10;3,0;17,0',
    '3': '20:5,-21;16,-21;10,-13;13,-13;15,-12;16,-11;17,-8;17,-6;16,-3;14,-1;11,0;8,0;5,-1;4,-2;3,-4',
    '4': '20:13,-21;3,-7;18,-7|13,-21;13,0',
    '5': '20:15,-21;5,-21;4,-12;5,-13;8,-14;11,-14;14,-13;16,-11;17,-8;17,-6;16,-3;14,-1;11,0;8,0;5,-1;4,-2;3,-4',
    '6': '20:16,-18;15,-20;12,-21;10,-21;7,-20;5,-17;4,-12;4,-7;5,-3;7,-1;10,0;11,0;14,-1;16,-3;17,-6;17,-7;16,-10;14,-12;11,-13;10,-13;7,-12;5,-10;4,-7',
    '7': '20:17,-21;7,0|3,-21;17,-21',
    '8': '20:8,-21;5,-20;4,-18;4,-16;5,-14;7,-13;11,-12;14,-11;16,-9;17,-7;17,-4;16,-2;15,-1;12,0;8,0;5,-1;4,-2;3,-4;3,-7;4,-9;6,-11;9,-12;13,-13;15,-14;16,-16;16,-18;15,-20;12,-21;8,-21',
    '9': '20:16,-14;15,-11;13,-9;10,-8;9,-8;6,-9;4,-11;3,-14;3,-15;4,-18;6,-20;9,-21;10,-21;13,-20;15,-18;16,-14;16,-9;15,-4;13,-1;10,0;8,0;5,-1;4,-3',
    ':': '10:5,-14;4,-13;5,-12;6,-13;5,-14|5,-2;4,-1;5,0;6,-1;5,-2',
    ';': '10:5,-14;4,-13;5,-12;6,-13;5,-14|6,-1;5,0;4,-1;5,-2;6,-1;6,1;5,3;4,4',
    '<': '24:20,-18;4,-9;20,0',
    '=': '26:4,-12;22,-12|4,-6;22,-6',
    '>': '24:4,-18;20,-9;4,0',

    '@': '27:18,-13;17,-15;15,-16;12,-16;10,-15;9,-14;8,-11;8,-8;9,-6;11,-5;14,-5;16,-6;17,-8|12,-16;10,-14;9,-11;9,-8;10,-6;11,-5|18,-16;17,-8;17,-5;19,-5;21,-7;22,-10;22,-12;21,-15;20,-17;18,-19;15,-20;12,-20;9,-19;7,-18;5,-16;4,-14;3,-11;3,-8;4,-5;5,-3;7,-1;9,0;12,1;15,1;18,0;20,-1;21,-2',
    'A': '18:9,-21;1,0|9,-21;17,0|4,-7;14,-7',
    'B': '21:4,-21;4,0|4,-21;13,-21;16,-20;17,-19;18,-17;18,-15;17,-13;16,-12;13,-11|4,-11;13,-11;16,-10;17,-9;18,-7;18,-4;17,-2;16,-1;13,0;4,0',
    'C': '21:18,-16;17,-18;15,-20;13,-21;9,-21;7,-20;5,-18;4,-16;3,-13;3,-8;4,-5;5,-3;7,-1;9,0;13,0;15,-1;17,-3;18,-5',
    'D': '21:4,-21;4,0|4,-21;11,-21;14,-20;16,-18;17,-16;18,-13;18,-8;17,-5;16,-3;14,-1;11,0;4,0',
    'E': '19:4,-21;4,0|4,-21;17,-21|4,-11;12,-11|4,0;17,0',
    'F': '18:4,-21;4,0|4,-21;17,-21|4,-11;12,-11',
    'G': '21:18,-16;17,-18;15,-20;13,-21;9,-21;7,-20;5,-18;4,-16;3,-13;3,-8;4,-5;5,-3;7,-1;9,0;13,0;15,-1;17,-3;18,-5;18,-8|13,-8;18,-8',
    'H': '22:4,-21;4,0|18,-21;18,0|4,-11;18,-11',
    'I': '8:4,-21;4,0',
    'J': '16:12,-21;12,-5;11,-2;10,-1;8,0;6,0;4,-1;3,-2;2,-5;2,-7',
    'K': '21:4,-21;4,0|18,-21;4,-7|9,-12;18,0',
    'L': '17:4,-21;4,0|4,0;16,0',
    'M': '24:4,-21;4,0|4,-21;12,0|20,-21;12,0|20,-21;20,0',
    'N': '22:4,-21;4,0|4,-21;18,0|18,-21;18,0',

    ctx.font = `900 ${fontSize}px Impact, "Arial Black", "Helvetica Neue", sans-serif`;

    // Line spacing: lineGap is the user-controlled gap in pixels at canvas
    // resolution (1024×1024). Total line height = fontSize + gap.
    // Allow negative gap to overlap lines (a tight-leading display style).
    const lineHeight = fontSize + (lineGapPx || 0);
    const totalHeight = lineHeight * lines.length;
    const startY = size / 2 - totalHeight / 2 + lineHeight / 2;

    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < lines.length; i++){
      ctx.fillText(lines[i], size / 2, startY + i * lineHeight);
    }

    return cv;
  }

  // For a given text mask, compute the arc segments where each ring at
  // radius r crosses the text shape. Returns an array per ring of
  // [startAngle, endAngle] pairs (in radians, world space — meaning
  // before any rotation is applied).
  //
  // We sample the alpha buffer at angular steps. Adjacent "inside" samples
  // collapse into a single segment; gaps between insides break segments.
  function buildSegmentsFromText(textCanvas, ringCount, angularSteps){
    const size = textCanvas.width;
    const ctx = textCanvas.getContext('2d');
    const imageData = ctx.getImageData(0, 0, size, size);
    const data = imageData.data;

    const cx = size / 2;
    const cy = size / 2;
    const maxR = Math.hypot(cx, cy);
    const period = maxR / ringCount;

    // Precomputed lookup: alpha at (x, y) > 0 means inside text
    function isInside(x, y){
      const ix = Math.round(x);
      const iy = Math.round(y);
      if (ix < 0 || ix >= size || iy < 0 || iy >= size) return false;
      // alpha channel = index*4 + 3
      return data[(iy * size + ix) * 4 + 3] > 32;
    }

    const segmentsByRing = [];
    const TWO_PI = Math.PI * 2;

    for (let i = 1; i <= ringCount; i++){
      const r = i * period;
      const segments = [];

      // Walk around the circle. Keep track of when we enter/exit the text.
      let inside = false;
      let segStart = 0;
      let firstSampleInside = false;

      for (let s = 0; s <= angularSteps; s++){
        const a = (s / angularSteps) * TWO_PI;
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;
        const here = isInside(x, y);

        if (s === 0){
          firstSampleInside = here;
          inside = here;
          if (here) segStart = a;
          continue;
        }

        if (here && !inside){
          // entered text
          segStart = a;
          inside = true;
        } else if (!here && inside){
          // exited text — close segment
          segments.push([segStart, a]);
          inside = false;
        }
      }

      // If we ended still inside and started inside, the last segment wraps
      // around to the first one — merge them.
      if (inside){
        if (firstSampleInside && segments.length > 0 && segments[0][0] === 0){
          // Merge: extend the last open segment past 2π and close at first segment's end
          segments[0][0] = segStart - TWO_PI;
        } else {
          segments.push([segStart, TWO_PI]);
        }
      }

      segmentsByRing.push(segments);
    }

    return { segmentsByRing, period };
  }

  // Render the text-clipped, per-ring-rotated arc segments into a canvas.
  // Each ring draws only its precomputed segments, but rotated by that
  // ring's offset. As rotation increases, segments slide around the ring
  // and end up outside the original text bounds.
  //
  // ringOffsets[i] = total rotation (in radians) for ring i. Caller computes
  // this however they like — combining manual drift, jitter, and/or Perlin.
  // Debug: render the Perlin field as a grayscale heatmap. Samples noise
  // spatially in 2D to match the new per-segment sampling model — this is
  // exactly the field that drives segment rotations. Pixel-rate sampling at
  // canvas resolution would be slow, so we sample at half resolution.
  function renderPerlinDebugCanvas(size, ringCount, scaleNorm, noiseT, opacity){
    const cv = document.createElement('canvas');
    cv.width = size;
    cv.height = size;
    const ctx = cv.getContext('2d');
    const imageData = ctx.createImageData(size, size);
    const data = imageData.data;

    const cx = size / 2;
    const cy = size / 2;
    const maxR = Math.hypot(cx, cy);
    const nScale = ringCount * scaleNorm;

    // Step pattern for performance: compute noise every 2 px, fill the gaps.
    const STEP = 2;
    for (let y = 0; y < size; y += STEP){
      const ny = (y - cy) / maxR;
      for (let x = 0; x < size; x += STEP){
        const nx = (x - cx) / maxR;
        const n = fbm3(nx * nScale, ny * nScale, noiseT, 1, 0.5);
        const v = Math.round(((n + 1) * 0.5) * 255 * opacity);
        // Fill 2×2 block
        for (let dy = 0; dy < STEP && y + dy < size; dy++){
          for (let dx = 0; dx < STEP && x + dx < size; dx++){
            const idx = ((y + dy) * size + (x + dx)) * 4;
            data[idx]     = v;
            data[idx + 1] = v;
            data[idx + 2] = v;
            data[idx + 3] = 255;
          }
        }
      }
    }
    ctx.putImageData(imageData, 0, 0);

    cv.width = size;
    cv.height = size;
    const ctx = cv.getContext('2d');

    const cx = size / 2;
    const cy = size / 2;
    const maxR = Math.hypot(cx, cy);

    for (let y = 0; y < size; y++){
      for (let x = 0; x < size; x++){

        const ny = (y - cy) / maxR;
        const m = sampleMaskAtPixel(nx, ny); // 0..1
        const v = Math.round(m * 255);

        data[idx + 1] = v;
        data[idx + 2] = v;

      { key: 'ringCap',       label: 'Rounded ends',        type: 'toggle', value: true },

      { key: 'rotation',      label: 'Base rotation (°)',   min: 0,   max: 360, step: 1,    value: 0 },
      { key: 'radialDrift',   label: 'Rotate lines (°)',    min: 0,   max: 720, step: 1,    value: 30 },
      { key: 'jitter',        label: 'Randomness (°)',      min: 0,   max: 180, step: 1,    value: 0 },
      { section: 'Perlin (drives Rotate lines)' },
      { key: 'perlinOn',      label: 'Perlin on',           type: 'toggle', value: true },
      { key: 'perlinScale',   label: 'Scale',               min: 50,  max: 1500,step: 1,    value: 460 },
      { key: 'perlinSpeed',   label: 'Speed',               min: 0,   max: 2,   step: 0.05, value: 0.2 },
      { key: 'perlinOpacity', label: 'Opacity',             min: 0,   max: 100, step: 1,    value: 100 },
      { key: 'perlinDebug',   label: 'Show noise field',    type: 'toggle', value: false, excludesKey: 'maskDebug' },
      { section: 'Mask (gradient on all rotation)' },
      { key: 'maskOn',        label: 'Mask on',             type: 'toggle', value: true },
      { key: 'maskCenterStr', label: 'Center strength',     min: 0,   max: 100, step: 1,    value: 100 },
      { key: 'maskEdgeStr',   label: 'Edge strength',       min: 0,   max: 100, step: 1,    value: 0 },
      { key: 'maskRadius',    label: 'Radius / band size (%)', min: 5, max: 100, step: 1, value: 35 },
      { key: 'maskSoftness',  label: 'Softness',            min: 0,   max: 100, step: 1,    value: 50 },
      { key: 'maskOpacity',   label: 'Mask opacity',        min: 0,   max: 100, step: 1,    value: 100 },
      { key: 'maskDebug',     label: 'Show mask gradient',  type: 'toggle', value: false, excludesKey: 'perlinDebug' },
    ],

    build(group){

      const maskEdge = (p.maskEdgeStr || 0) / 100;
      const maskOpacity = (p.maskOpacity || 0) / 100;
      const maskRadiusFrac = (p.maskRadius || 50) / 100;
      const softnessFrac = (p.maskSoftness || 0) / 100;

        else if (d >= outer) g = 1;

      // Used everywhere: the rigid sliders (per-ring) and the per-segment
      // Perlin sampling. Same value at the same pixel position.
      function sampleMaskAtPixel(nx, ny){

      const segmentOffsets = new Array(ringCount);

      for (let i = 0; i < ringCount; i++){

        // Scaled by circular mask only (bands are ignored for rigid rotation,

        // Rigid contribution — same for every segment of this ring.

            const aMid = (a0 + a1) * 0.5;
            const px = Math.cos(aMid) * tt;
            const py = Math.sin(aMid) * tt;
            const nScale = ringCount * scaleNorm;
            const n = fbm3(px * nScale, py * nScale, noiseT, 1, 0.5);

            const mPerlin = sampleMaskAtPixel(px, py);

            ringOffs[s] = rigidOff + n * driftRad * opacity * mPerlin;

          for (let s = 0; s < segments.length; s++){

          }
        }

        segmentOffsets[i] = ringOffs;
      }

      const ringColor = p.ringColor || '#ffffff';
      const bgColor = p.bgColor || '#000000';
      const perlinDebug = !!p.perlinDebug;
      const maskDebug = !!p.maskDebug;

      const arcsChanged = segChanged || animating || (
        c.ringThickness !== p.ringThickness ||
        c.ringColor !== p.ringColor ||
        c.ringCap !== p.ringCap ||
        c.bgColor !== p.bgColor ||
        c.perlinDebug !== p.perlinDebug ||
        c.maskDebug !== p.maskDebug ||
        c.rotation !== p.rotation ||
        c.radialDrift !== p.radialDrift ||
        c.jitter !== p.jitter ||
        c.perlinOn !== p.perlinOn ||
        c.maskOn !== p.maskOn ||
        c.maskCenterStr !== p.maskCenterStr ||
        c.maskEdgeStr !== p.maskEdgeStr ||
        c.maskRadius !== p.maskRadius ||
        c.maskSoftness !== p.maskSoftness ||
        c.maskOpacity !== p.maskOpacity

      }

      c.arcsCanvas = renderClippedArcsCanvas(
        SIZE,
        c.segments,
        c.period,
        p.ringThickness,
        segmentOffsets,
        ringColor,
        lineCap,
        bgColor,
        debugCanvas
      );
      c.ringThickness = p.ringThickness;
      c.ringColor = p.ringColor;
      c.ringCap = p.ringCap;
      c.bgColor = p.bgColor;
      c.perlinDebug = p.perlinDebug;
      c.maskDebug = p.maskDebug;
      c.rotation = p.rotation;
      c.radialDrift = p.radialDrift;
      c.jitter = p.jitter;
      c.perlinOn = p.perlinOn;
      c.maskOn = p.maskOn;
      c.maskCenterStr = p.maskCenterStr;
      c.maskEdgeStr = p.maskEdgeStr;
      c.maskRadius = p.maskRadius;
      c.maskSoftness = p.maskSoftness;
      c.maskOpacity = p.maskOpacity;

      state.texture.image = c.arcsCanvas;
      state.texture.needsUpdate = true;
    }
  });

        return;
      }

      // Toggle (boolean checkbox styled as a row with label + switch)
      if (c.type === 'toggle'){
        const top = document.createElement('div');
        top.className = 'top';
        const lab = document.createElement('label');
        lab.htmlFor = 'ctrl-' + c.key;
        lab.textContent = c.label;
        top.appendChild(lab);
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.id = 'ctrl-' + c.key;
        input.checked = !!params[c.key];
        input.style.cursor = 'pointer';
        input.style.accentColor = 'var(--accent)';
        input.addEventListener('change', () => {
          params[c.key] = input.checked;
          // If this toggle excludes another and we just turned ON, force the
          // other off — keeps mutually-exclusive toggles in sync.
          if (input.checked && c.excludesKey){
            params[c.excludesKey] = false;
            const otherInput = document.getElementById('ctrl-' + c.excludesKey);
            if (otherInput) otherInput.checked = false;
          }
        });
        top.appendChild(input);
        row.appendChild(top);
        controlsHost.appendChild(row);
        return;
      }

      // Default: slider
      const top = document.createElement('div');
      top.className = 'top';
      const lab = document.createElement('label');
      lab.htmlFor = 'ctrl-' + c.key;
      lab.textContent = c.label;
      const val = document.createElement('span');
      val.className = 'val';
      val.id = 'ctrl-' + c.key + '-out';
      val.textContent = formatVal(c.step, params[c.key]);
      top.appendChild(lab);
      top.appendChild(val);
      const input = document.createElement('input');
      input.type = 'range';
      input.id = 'ctrl-' + c.key;
      input.min = c.min; input.max = c.max; input.step = c.step;
      input.value = params[c.key];
      input.addEventListener('input', () => {
        params[c.key] = parseFloat(input.value);
        val.textContent = formatVal(c.step, params[c.key]);
      });
      row.appendChild(top);
      row.appendChild(input);
      controlsHost.appendChild(row);
    });
  }

  function selectAnimation(idx){
    if (idx === currentIdx) return;

    if (currentGroup){
      scene.remove(currentGroup);
      currentGroup.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material){
          if (o.material.map) o.material.map.dispose();
          o.material.dispose();
        }
      });
    }

    currentIdx = idx;
    currentAnim = ANIMATIONS[idx];

    renderer.setClearColor(currentAnim.bg, 1);
    metaEl.style.color = currentAnim.metaColor || 'rgba(255,255,255,0.45)';
    metaEl.textContent = 'webgl · three.js · ' + currentAnim.label.toLowerCase();

    activeCamera = currentAnim.is3D ? perspCam : orthoCam;

    currentGroup = new THREE.Group();
    scene.add(currentGroup);
    currentState = currentAnim.build(currentGroup);
    // Sync Line2 material resolution (does nothing if the animation isn't using Line2)
    if (currentState && currentState.material && currentState.material.resolution){
      currentState.material.resolution.set(lastPixelSize, lastPixelSize);
    }

    buildControls(currentAnim);

    Array.from(listEl.children).forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });

    startT = performance.now();
    pausedAccum = 0;
  }

  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!currentAnim) return;
    const animState = ANIM_STATE[currentAnim.id];
    Object.keys(animState.defaults).forEach(k => {
      animState.params[k] = animState.defaults[k];
      const input = document.getElementById('ctrl-' + k);
      const out = document.getElementById('ctrl-' + k + '-out');
      if (input){
        if (input.type === 'checkbox') input.checked = !!animState.defaults[k];
        else input.value = animState.defaults[k];
      }
      if (out){
        const ctrl = currentAnim.controls.find(c => c.key === k);
        if (ctrl && typeof ctrl.step === 'number'){
          out.textContent = formatVal(ctrl.step, animState.defaults[k]);
        }
      }
    });
  });

  // Theme toggle: dark by default, persisted in localStorage.
  const themeBtn = document.getElementById('theme-toggle');
  function applyTheme(theme){
    if (theme === 'light') document.body.classList.add('light');
    else document.body.classList.remove('light');
    themeBtn.textContent = theme === 'light' ? 'Dark mode' : 'Light mode';
  }
  let storedTheme = null;
  try { storedTheme = localStorage.getItem('motion-theme'); } catch(e){}
  applyTheme(storedTheme === 'dark' ? 'dark' : 'light');
  themeBtn.addEventListener('click', () => {
    const next = document.body.classList.contains('light') ? 'dark' : 'light';
    applyTheme(next);
    try { localStorage.setItem('motion-theme', next); } catch(e){}
  });

  document.getElementById('btn-restart').addEventListener('click', () => {
    startT = performance.now();
    pausedAccum = 0;
  });

  const pauseBtn = document.getElementById('btn-pause');
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Play' : 'Pause';
    if (!paused) pausedAccum += performance.now() - pauseStart;
    else pauseStart = performance.now();
  });

  function loop(now){
    requestAnimationFrame(loop);
    if (paused) return;
    const t = (now - startT - pausedAccum) / 1000;
    if (currentAnim){
      const params = ANIM_STATE[currentAnim.id].params;
      // If the animation exposes a bgColor param, that overrides the
      // registration default. Cheap to set every frame.
      if (typeof params.bgColor === 'string'){
        renderer.setClearColor(params.bgColor, 1);
        // Auto-flip meta-text color for contrast against whatever bg is set.
        // Standard relative-luminance approximation (sRGB).
        const hex = params.bgColor.replace('#', '');
        if (hex.length === 6){
          const r = parseInt(hex.slice(0,2), 16) / 255;
          const g = parseInt(hex.slice(2,4), 16) / 255;
          const b = parseInt(hex.slice(4,6), 16) / 255;
          const lum = 0.2126*r + 0.7152*g + 0.0722*b;
          metaEl.style.color = lum > 0.5
            ? 'rgba(0,0,0,0.4)'
            : 'rgba(255,255,255,0.45)';
        }
      }
      currentAnim.update(t, params, currentState);
    }
    renderer.render(scene, activeCamera);
  }

  selectAnimation(0);
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
